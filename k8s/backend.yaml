apiVersion: apps/v1
kind: Deployment
metadata:
  name: acs-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acs-backend
  template:
    metadata:
      labels:
        app: acs-backend
    spec:
      containers:
        - name: backend
          image: piyushdocs/acs-server:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://user:password@postgres-service:5432/acs_db"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_URL
              value: "redis://redis-service:6379"
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /sentinel/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /sentinel/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: acs-backend-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: acs-backend
  ports:
    - port: 8000
      targetPort: 8000